name: Awesome Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npx --yes awesome-lint
