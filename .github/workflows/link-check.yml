name: Link Check

on:
  pull_request:
    paths:
      - README.md
      - llms.txt
      - CONTRIBUTING.md
      - SUBMISSIONS.md
      - .github/workflows/link-check.yml
  push:
    branches:
      - main
    paths:
      - README.md
      - llms.txt
      - CONTRIBUTING.md
      - SUBMISSIONS.md
      - .github/workflows/link-check.yml
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readme-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npx --yes markdown-link-check README.md
      - run: npx --yes markdown-link-check llms.txt
      - run: npx --yes markdown-link-check SUBMISSIONS.md
